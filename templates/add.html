{% extends 'base.html' %}
{% from 'bootstrap5/form.html' import render_form %}

{% block title %}Add Movie{% endblock %}

{% block content %}
<div class="content">
    <h1 class="heading">Add a Movie</h1>
    <p class="description">Search for a movie title to add it to your collection.</p>
    {{ render_form(form, novalidate=True) }}
    <div class="text-center mt-4">
        <a href="{{ url_for('home') }}" style="color: var(--text-secondary); text-decoration: none; font-weight: 600;">← Back to Collection</a>
    </div>
</div>
{% endblock %}
